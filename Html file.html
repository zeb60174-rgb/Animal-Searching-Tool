<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animalis · voice & text animal explorer</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- custom styles -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="glass-wrapper">
        <header>
            <h1><i class="fas fa-paw"></i> Animalis <span class="light">— know them all</span></h1>
            <p class="subhead">type name or speak · wikipedia summary + multilingual names + image</p>
        </header>

        <div class="search-panel">
            <div class="input-group">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="animalInput" placeholder="e.g. Lion, Polar bear, Hummingbird..." autofocus>
                <button id="micBtn" class="mic-btn" title="Speak animal name"><i class="fas fa-microphone"></i></button>
                <button id="searchBtn" class="search-btn">Discover</button>
            </div>
            <div id="voiceHint" class="voice-hint"></div>
        </div>

        <!-- loading spinner -->
        <div id="loading" class="loading-spinner hidden">
            <div class="spinner"></div>
            <span>searching wildlife...</span>
        </div>

        <!-- main result card -->
        <div id="resultContainer" class="result-card hidden">
            <div class="result-grid">
                <!-- image column -->
                <div class="image-col">
                    <div class="image-frame" id="imageFrame">
                        <img id="animalImage" src="" alt="animal image">
                    </div>
                </div>
                <!-- info column -->
                <div class="info-col">
                    <h2 id="animalName">-</h2>
                    <div class="scientific-name" id="scientificName"></div>
                    <div class="desc-box" id="description">
                        <p>Description will appear here</p>
                    </div>
                    
                    <!-- quick facts (semi‑structured from extract) -->
                    <div class="fact-row" id="factFamily">
                        <i class="fas fa-tree"></i> <span id="familyValue"></span>
                    </div>
                    <div class="fact-row" id="factDiet">
                        <i class="fas fa-drumstick-bite"></i> <span id="dietValue"></span>
                    </div>
                    
                    <!-- translations / multilingual names -->
                    <div class="translations-section">
                        <h3><i class="fas fa-language"></i> name in many languages</h3>
                        <div id="translationsList" class="translation-grid">
                            <!-- filled by js -->
                        </div>
                    </div>
                    
                    <div class="wiki-attrib">
                        <i class="fab fa-wikipedia-w"></i> data from Wikipedia
                    </div>
                </div>
            </div>
        </div>

        <!-- error message -->
        <div id="errorMessage" class="error-msg hidden">
            <i class="fas fa-exclamation-triangle"></i> <span></span>
        </div>
    </div>

    <!-- custom js -->
    <script src="index.js"></script>
</body>
</html>
